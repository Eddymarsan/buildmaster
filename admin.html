<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BuildMaster Construction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease-out;
        }

        .admin-header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .admin-header p {
            font-size: 1.1em;
            color: #666;
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        .reports-table {
            width: 100%;
            border-collapse: collapse;
        }

        .reports-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .reports-table th {
            padding: 18px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .reports-table tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .reports-table tbody tr:hover {
            background-color: #f8f9ff;
            transform: scale(1.01);
            box-shadow: inset 0 0 10px rgba(102, 126, 234, 0.1);
        }

        .reports-table tbody tr:last-child {
            border-bottom: none;
        }

        .reports-table td {
            padding: 16px;
            color: #333;
            font-size: 0.95em;
        }

        .reports-table td:first-child {
            font-weight: 600;
            color: #667eea;
        }

        /* Column-specific styling */
        .col-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .col-email {
            color: #666;
            word-break: break-word;
        }

        .col-message {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #777;
        }

        .col-type {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .col-date {
            color: #666;
            font-weight: 500;
        }

        .col-budget {
            font-weight: 700;
            color: #2e7d32;
            font-size: 1.05em;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-align: center;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            margin-right: 10px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            text-align: center;
            padding: 30px 20px;
            border-radius: 8px;
            border-left: 5px solid #c62828;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 3em;
            color: #ddd;
            margin-bottom: 20px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .admin-header h1 {
                font-size: 1.8em;
            }

            .reports-table th, .reports-table td {
                padding: 12px 8px;
                font-size: 0.85em;
            }

            .col-message {
                max-width: 150px;
            }

            .reports-table {
                font-size: 0.9em;
            }
        }

        .logout-link {
            color: #ff6b6b !important;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-link:hover {
            color: #ff5252 !important;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="Index.html">
                <img src="Images/JuPet_logo.png" alt="BuildMaster Construction logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="Index.html">Back to Site</a></li>
                <li><a href="#" id="adminLogoutBtn" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>View and manage client booking reports</p>
        </div>

        <div id="reportsContainer">
            <div class="loading">Loading reports...</div>
        </div>
    </div>

    <script>
        // Authentication check
        if (localStorage.getItem("adminAuthenticated") !== "true") {
            alert("Access denied. Please login first.");
            window.location.href = "Index.html";
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Set up logout button
            document.getElementById("adminLogoutBtn").addEventListener("click", (e) => {
                e.preventDefault();
                localStorage.removeItem("adminAuthenticated");
                alert("Logged out successfully");
                window.location.href = "Index.html";
            });

            // Load reports
            fetchReports();
        });

        async function fetchReports() {
            try {
                const response = await fetch('http://localhost:5000/api/contact');
                if (!response.ok) {
                    throw new Error('Failed to fetch reports');
                }
                const reports = await response.json();
                displayReports(reports);
            } catch (error) {
                console.error('Error fetching reports:', error);
                document.getElementById('reportsContainer').innerHTML =
                    '<div class="error">Error loading reports. Please check if the server is running.</div>';
            }
        }

        function displayReports(reports) {
            if (reports.length === 0) {
                document.getElementById('reportsContainer').innerHTML =
                    '<div class="empty-state"><i class="fas fa-inbox"></i><p>No booking reports found.</p></div>';
                return;
            }

            let html = `
                <div class="table-wrapper">
                    <table class="reports-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Project Type</th>
                                <th>Preferred Date</th>
                                <th>Budget</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            reports.forEach(report => {
                const projectType = report.project_type || 'N/A';
                const phone = report.phone || 'N/A';
                const message = report.message || 'N/A';
                const date = report.preferred_date ? new Date(report.preferred_date).toLocaleDateString() : 'N/A';
                
                html += `
                    <tr>
                        <td>${report.id}</td>
                        <td class="col-name">${report.name}</td>
                        <td class="col-email">${report.email}</td>
                        <td>${phone}</td>
                        <td><span class="col-type">${projectType}</span></td>
                        <td class="col-date">${date}</td>
                        <td class="col-budget">${report.budget || 'N/A'}</td>
                        <td class="col-message" title="${message}">${message}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('reportsContainer').innerHTML = html;
        }
    </script>
</body>
</html>
